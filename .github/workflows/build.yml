name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── JOB 1: Linux'ta SpoofDPI'yi Windows için cross-compile et ──
  build-proxy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Cross-compile SpoofDPI v1.2.1 for Windows
        run: |
          curl -L "https://github.com/xvzc/SpoofDPI/archive/refs/tags/v1.2.1.tar.gz" -o spoofdpi.tar.gz
          tar xzf spoofdpi.tar.gz
          SPOOFDIR=$(find . -maxdepth 1 -type d | grep -i spoof | head -1)
          echo "Klasör: $SPOOFDIR"
          cd "$SPOOFDIR"

          # 1) Ortak kod (bufferPool + CloseConns) ayrı dosyaya taşı
          cat > internal/netutil/conn_common.go << 'GOEOF'
package netutil

import (
	"io"
	"sync"
)

var bufferPool = sync.Pool{
	New: func() any {
		b := make([]byte, 32*1024)
		return &b
	},
}

func CloseConns(closers ...io.Closer) {
	for _, c := range closers {
		if c != nil {
			_ = c.Close()
		}
	}
}
GOEOF

          # 2) conn.go: bufferPool + CloseConns'u kaldır, !windows tag ekle
          sed -i '1s/^/\/\/go:build !windows\n\n/' internal/netutil/conn.go
          # bufferPool ve CloseConns tanımlarını conn.go'dan sil (artık conn_common.go'da)
          python3 - << 'PYEOF'
import re
with open('internal/netutil/conn.go', 'r') as f:
    content = f.read()
# bufferPool bloğunu kaldır
content = re.sub(r'// bufferPool.*?}\n\}\n', '', content, flags=re.DOTALL)
# CloseConns fonksiyonunu kaldır
content = re.sub(r'// CloseConns.*?}\n}\n', '', content, flags=re.DOTALL)
with open('internal/netutil/conn.go', 'w') as f:
    f.write(content)
print("conn.go temizlendi")
PYEOF

          # 3) Windows stub: TunnelConns (EPIPE yok) + SetTTL (no-op)
          cat > internal/netutil/conn_windows.go << 'GOEOF'
//go:build windows

package netutil

import (
	"context"
	"errors"
	"fmt"
	"io"
	"net"

	"github.com/rs/zerolog"
	"github.com/xvzc/SpoofDPI/internal/logging"
)

func TunnelConns(
	ctx context.Context,
	logger zerolog.Logger,
	errCh chan<- error,
	dst net.Conn,
	src net.Conn,
) {
	var n int64
	logger = logging.WithLocalScope(ctx, logger, "tunnel")

	stop := context.AfterFunc(ctx, func() { CloseConns(src, dst) })
	defer func() {
		stop()
		CloseConns(src, dst)
		logger.Trace().Int64("len", n).
			Str("route", fmt.Sprintf("%s -> %s", src.RemoteAddr(), dst.RemoteAddr())).
			Msgf("done")
	}()

	bufPtr := bufferPool.Get().(*[]byte)
	defer bufferPool.Put(bufPtr)

	n, err := io.CopyBuffer(dst, src, *bufPtr)
	if err != nil && !errors.Is(err, net.ErrClosed) && !errors.Is(err, io.EOF) {
		errCh <- err
		return
	}
	errCh <- nil
}

func SetTTL(conn net.Conn, isIPv4 bool, ttl uint8) error {
	return nil
}
GOEOF

          GOOS=windows GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o ../bypax-proxy.exe ./cmd/spoofdpi
          echo "Build OK"
          ls -lh ../bypax-proxy.exe

      - name: Upload proxy binary
        uses: actions/upload-artifact@v4
        with:
          name: bypax-proxy
          path: bypax-proxy.exe
          retention-days: 1

  # ── JOB 2: Windows'ta Tauri build ──
  build-tauri:
    needs: build-proxy
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Download proxy binary
        uses: actions/download-artifact@v4
        with:
          name: bypax-proxy
          path: spoofdpi/

      - name: Copy proxy binary to tauri binaries
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          cp spoofdpi/bypax-proxy.exe src-tauri/binaries/bypax-proxy.exe
          cp spoofdpi/bypax-proxy.exe "src-tauri/binaries/bypax-proxy-x86_64-pc-windows-msvc.exe"
          ls -lh src-tauri/binaries/

      - name: Update proxy icon
        shell: bash
        run: node change-icon.js || echo "Icon update skipped"

      - name: Download Npcap installer
        shell: bash
        run: |
          curl -L --retry 3 --max-time 120 \
            "https://npcap.com/dist/npcap-1.79.exe" \
            -o "src-tauri/binaries/npcap-installer.exe" \
            --user-agent "Mozilla/5.0"
          ls -lh src-tauri/binaries/npcap-installer.exe

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v1.0.0
          releaseName: 'DarknesDPI v1.0.0'
          releaseBody: 'Windows için DPI bypass uygulaması.'
          releaseDraft: false
          prerelease: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DarknesDPI-Windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          retention-days: 7
