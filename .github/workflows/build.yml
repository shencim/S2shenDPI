name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── JOB 1: Linux'ta SpoofDPI'yi Windows için cross-compile et ──
  build-proxy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Cross-compile SpoofDPI v1.2.1 for Windows
        run: |
          curl -L "https://github.com/xvzc/SpoofDPI/archive/refs/tags/v1.2.1.tar.gz" -o spoofdpi.tar.gz
          tar xzf spoofdpi.tar.gz
          SPOOFDIR=$(find . -maxdepth 1 -type d | grep -i spoof | head -1)
          echo "Klasör: $SPOOFDIR"
          cp scripts/patch-spoofdpi.sh "$SPOOFDIR/"
          cd "$SPOOFDIR"
          bash patch-spoofdpi.sh
          GOOS=windows GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o ../bypax-proxy.exe ./cmd/spoofdpi
          echo "Build OK"
          ls -lh ../bypax-proxy.exe

      - name: Upload proxy binary
        uses: actions/upload-artifact@v4
        with:
          name: bypax-proxy
          path: bypax-proxy.exe
          retention-days: 1

  # ── JOB 2: Windows'ta Tauri build ──
  build-tauri:
    needs: build-proxy
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Download proxy binary
        uses: actions/download-artifact@v4
        with:
          name: bypax-proxy
          path: spoofdpi/

      - name: Copy proxy binary to tauri binaries
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          cp spoofdpi/bypax-proxy.exe src-tauri/binaries/bypax-proxy.exe
          cp spoofdpi/bypax-proxy.exe "src-tauri/binaries/bypax-proxy-x86_64-pc-windows-msvc.exe"
          ls -lh src-tauri/binaries/

      - name: Update proxy icon
        shell: bash
        run: node change-icon.js || echo "Icon update skipped"

      - name: Download Npcap installer
        shell: bash
        run: |
          curl -L --retry 3 --max-time 120 \
            "https://npcap.com/dist/npcap-1.79.exe" \
            -o "src-tauri/binaries/npcap-installer.exe" \
            --user-agent "Mozilla/5.0"
          ls -lh src-tauri/binaries/npcap-installer.exe

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v1.0.0
          releaseName: 'DarknesDPI v1.0.0'
          releaseBody: 'Windows için DPI bypass uygulaması.'
          releaseDraft: false
          prerelease: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DarknesDPI-Windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          retention-days: 7
