name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Clone SpoofDPI source
        shell: bash
        run: |
          # v1.2.1 tag dene, yoksa main'den son sürümü al
          git clone --depth 1 https://github.com/xvzc/SpoofDPI.git SpoofDPI-src || true
          if [ ! -f "SpoofDPI-src/go.mod" ]; then
            echo "Clone failed, retrying..."
            git clone https://github.com/xvzc/SpoofDPI.git SpoofDPI-src
          fi

      - name: Build SpoofDPI (bypax-proxy)
        shell: bash
        run: |
          mkdir -p spoofdpi
          mkdir -p src-tauri/binaries
          cd SpoofDPI-src
          GOOS=windows GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o ../spoofdpi/bypax-proxy.exe ./cmd/spoofdpi
          echo "Build OK"
          ls -lh ../spoofdpi/bypax-proxy.exe

      - name: Copy proxy binary to tauri binaries
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          cp spoofdpi/bypax-proxy.exe src-tauri/binaries/bypax-proxy.exe
          cp spoofdpi/bypax-proxy.exe "src-tauri/binaries/bypax-proxy-x86_64-pc-windows-msvc.exe"
          echo "Binary copied:"
          ls -lh src-tauri/binaries/

      - name: Download Npcap installer
        shell: bash
        run: |
          curl -L --retry 3 "https://npcap.com/dist/npcap-1.79.exe" \
            -o "src-tauri/binaries/npcap-installer.exe" \
            --user-agent "Mozilla/5.0"
          echo "Npcap size:"
          ls -lh src-tauri/binaries/npcap-installer.exe

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v1.0.0
          releaseName: 'DarknesDPI v1.0.0'
          releaseBody: 'Windows için DPI bypass uygulaması.'
          releaseDraft: false
          prerelease: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DarknesDPI-Windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          retention-days: 7
